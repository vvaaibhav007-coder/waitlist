<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Claritee</title>
  <meta name="description" content="Claritee is a decision intelligence tool that scores your options, surfaces your trade-offs, and gives you a clear recommendation." />
  <meta name="author" content="Claritee" />

  <meta property="og:title" content="Claritee" />
  <meta property="og:description" content="A decision intelligence tool that scores your options, surfaces your trade-offs, and gives you a clear recommendation — in nine steps." />
  <meta property="og:type" content="website" />

  <meta name="twitter:card" content="summary" />

  <!-- App Icon -->
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="alternate icon" href="/favicon.ico" />
</head>

<body>
  <div id="root">
    <style>
      body, html {
        margin: 0;
        padding: 0;
        background-color: #030303; /* matches bg-void */
        height: 100vh;
        width: 100vw;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .initial-loader-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        width: 100%;
        height: 100%;
        color: #6E9EEB;
        font-family: system-ui, -apple-system, sans-serif;
      }
      .loader-spinner {
        width: 40px;
        height: 40px;
        border: 3px solid rgba(110, 158, 235, 0.2);
        border-radius: 50%;
        border-top-color: #6E9EEB;
        animation: spin 1s ease-in-out infinite;
        margin-bottom: 20px;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
    <div class="initial-loader-container">
      <div class="loader-spinner"></div>
    </div>
  </div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
